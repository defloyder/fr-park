services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env.production}
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-park.auralith.ru}
      APP_IP: ${APP_IP:-185.117.152.106}
      DB_HOST: postgres
      REDIS_HOST: redis
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - app_storage:/app/storage
      - app_cache:/app/bootstrap/cache
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-parkfree}
      POSTGRES_USER: ${DB_USERNAME:-parkfree}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-parkfree} -d ${DB_DATABASE:-parkfree}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

volumes:
  app_storage:
  app_cache:
  caddy_data:
  caddy_config:
  postgres_data:
  redis_data:
