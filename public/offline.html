<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#071126">
    <title>Auralith Maps: нет сети</title>
    <style>
        :root {
            color-scheme: dark;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #071126;
            color: #f8fbff;
        }

        body {
            display: grid;
            min-height: 100svh;
            margin: 0;
            place-items: center;
            background:
                radial-gradient(circle at 20% 20%, rgba(32, 200, 255, 0.2), transparent 34rem),
                radial-gradient(circle at 80% 80%, rgba(124, 61, 255, 0.22), transparent 30rem),
                #071126;
        }

        main {
            width: min(32rem, calc(100vw - 2rem));
            padding: 2rem;
            box-sizing: border-box;
            text-align: center;
            background: rgba(15, 28, 52, 0.86);
            border: 1px solid rgba(125, 211, 252, 0.24);
            border-radius: 1.5rem;
            box-shadow: 0 1.5rem 4rem rgba(0, 0, 0, 0.35);
        }

        h1 {
            margin: 0 0 0.75rem;
            font-size: clamp(1.6rem, 7vw, 2.4rem);
        }

        p {
            margin: 0 0 1.5rem;
            color: #cbd5e1;
            line-height: 1.55;
        }

        a {
            display: inline-grid;
            min-width: 10rem;
            min-height: 3rem;
            padding: 0 1.25rem;
            place-items: center;
            box-sizing: border-box;
            color: #fff;
            font: inherit;
            font-weight: 800;
            text-decoration: none;
            background: linear-gradient(135deg, #7c3dff, #2aa8ff);
            border: 0;
            border-radius: 0.9rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
<main>
    <h1>Нет подключения к сети</h1>
    <p>Карта, парковки и построение маршрута требуют интернет. Проверьте соединение и повторите попытку.</p>
    <a href="/">Повторить</a>
</main>
</body>
</html>
